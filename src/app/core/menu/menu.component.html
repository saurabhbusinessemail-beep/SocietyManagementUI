<nav class="app-menu" [attr.data-mode]="windowService.mode.value" [class.open]="open" *ngIf="menuItems.length > 0">

    <!-- overlay backdrop for tablet/mobile when open -->
    <div class="backdrop" *ngIf="open && windowService.mode.value !== 'desktop'" (click)="closeOverlay()"></div>

    <!-- Expanded area (desktop) or popover/drawer (tablet/mobile) -->
    <div class="menu-inner">
        <div class="brand" (click)="toggleMenu()"
            *ngIf="windowService.mode.value !== 'desktop' && windowService.mode.value !== 'tablet'">
            <div class="brand-icon">
                <span class="logo-mobile">
                    <img class="icon menu-icon" src="assets/logo.png">
                </span>
                <app-icon name="double-arrow-right" color="var(--color-header-text)" *ngIf="!this.open"></app-icon>
            </div>
            <div class="menu-close" *ngIf="open">
                <button class="btn only-content" *ngIf="open">
                    <app-icon name="clear" color="var(--color-header-text)"></app-icon>
                </button>
            </div>
        </div>

        <ul class="menu-list">
            <li *ngFor="let m of menuItems" class="menu-item">
                <div (click)="closeOverlay(m)"
                    [ngClass]="{ 'active': menuService.selectedMenu.value?.menuId === m.menuId}">
                    <app-icon [name]="m.icon ?? ''"
                        [color]="menuService.selectedMenu.value?.menuId === m.menuId ? 'var(--color-border-highlight)' : 'var(--color-header-text)'"
                        size="xl"></app-icon>
                    <span class="label" *ngIf="open">{{ m.menuName }}</span>
                </div>
            </li>
        </ul>
    </div>

</nav>
