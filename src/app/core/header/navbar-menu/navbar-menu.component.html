<!-- Mobile Menu -->
<div class="mobile-menu">
    <!-- Dynamic menu links from @Input array -->
    <div class="mobile-menu-links">
        <a *ngFor="let item of menuItems" [href]="generateHref(item)" class="mobile-menu-link"
            (click)="onMenuItemClick(item, $event)">
            {{ item }}
        </a>
    </div>

    <!-- Static action buttons (these don't change) -->
    <div class="mobile-menu-actions" *ngIf="extendedMenuTemplate">
        <ng-container *ngTemplateOutlet="extendedMenuTemplate"></ng-container>
    </div>
</div>

<!-- Desktop/Tablet Navigation -->
<nav class="desktop-nav">
    <a *ngFor="let item of menuItems" [href]="generateHref(item)" class="desktop-nav-link"
        (click)="onMenuItemClick(item, $event)">
        {{ item }}
    </a>
</nav>
