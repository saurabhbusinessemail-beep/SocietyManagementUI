<footer class="app-footer">

    <ng-container *ngFor="let menu of topTwoMenus">
        <app-icon [name]="menu.icon ?? ''" size="xxl" 
                  [color]="menuService.selectedMenu.value?.menuId === menu.menuId ? 'var(--color-border-highlight)' : 'var(--color-header-text)'"
                  (click)="navigateToMenu(menu)"></app-icon>
    </ng-container>

</footer>
