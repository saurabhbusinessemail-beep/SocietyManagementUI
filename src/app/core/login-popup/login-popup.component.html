<div *ngIf="step === 'login'" class="login-container">
    <div class="full-w flex flex-end">
        <app-icon name="close" size="xxl" (click)="closePopup()"></app-icon>
    </div>
    <div class="login-card">
        <form class="login-form" (ngSubmit)="sendOtp()" [formGroup]="loginForm">
            <div class="form-group">
                <label for="countryCode">Ext.</label>
                <ui-search-box formControlName="country" [config]="countryConfig"
                    *ngIf="!countryService.storageHasDefaultCountry || changeCountryNeeded"
                    [options]="countryService.filteredCountryCallingOptions"
                    [defaultSelectedValue]="countryService.defaultCountry_Option"
                    (searchChange)="onSearchChange($event)">
                </ui-search-box>
                <label *ngIf="countryService.storageHasDefaultCountry && !changeCountryNeeded" class="flex">
                    <span class="flex-auto"> {{ countryService.defaultCountry_Option?.label }} </span>
                    <span>
                        <button class="btn-link" (click)="changeCountryNeeded = true">Change</button>
                    </span>
                </label>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" class="input" appAutoFocus formControlName="phone"
                    placeholder="Enter phone number" />
            </div>

            <button type="submit" class="btn primary login-btn" [disabled]="loginForm.invalid || isLoading">
                {{ isLoading ? 'Sending…' : 'Send OTP' }}
            </button>
        </form>
    </div>
</div>

<div *ngIf="step === 'otp'" class="login-container">
    <div class="login-card">
        <button class="btn primary" (click)="resetToLogin()">
            <app-icon name="arrow-left" color="white"></app-icon>
        </button>

        <p class="section-header">OTP sent to {{ loginForm.value.phone }}</p>

        <form class="login-form" (ngSubmit)="verifyOtp()" [formGroup]="otpForm">
            <div class="form-group">
                <label for="otp">Enter OTP</label>
                <input id="otp" type="number" class="input" formControlName="otp" maxlength="6"
                    placeholder="Enter 6-digit OTP" />
            </div>

            <p class="note" *ngIf="countdown > 0">Time remaining: {{ countdown | timeFormat }}</p>

            <!-- Fixed: Removed duplicate [disabled] and simplified ngClass -->
            <button class="btn login-btn" [ngClass]="{
                        'primary': countdown > 0 && !otpForm.invalid, 
                        'cancel': !countdown || otpForm.invalid
                    }" type="submit" [disabled]="otpForm.invalid || isVerifying || !countdown">
                {{ isVerifying ? 'Verifying…' : 'Verify OTP' }}
            </button>

            <!-- Fixed: Simplified ngClass for resend button -->
            <button class="btn login-btn" [ngClass]="{
                        'primary': !countdown, 
                        'cancel': countdown > 0
                    }" type="button" (click)="resendOtp()" [disabled]="countdown > 0">
                Resend OTP
            </button>

            <p *ngIf="otpError" class="error-message">OTP verification failed. Try again.</p>
        </form>
    </div>
</div>
