<button [ngClass]="getbuttonClasses()" [attr.routerLink]="routerLink ? routerLink : null" matRipple
    (click)="clicked.emit($event)" [disabled]="disable ?? disabled" type="{{ isSubmit ? 'submit' : 'button' }}">
    <span class="label" *ngIf="label">{{ label | uppercase }}</span>
    <ng-content></ng-content>
</button>
