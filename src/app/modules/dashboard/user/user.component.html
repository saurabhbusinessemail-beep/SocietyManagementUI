<!-- user.component.html -->
<app-layout [hideMoreActions]="true" pageTitle="">
    <div class="banner-container">
        <img src="../../../../assets/banner.png" class="banner-image">
    </div>

    <div class="user-container">
        <!-- JOIN AS SECTION -->
        <ui-form-layout title="JOIN AS" [showAsSection]="true" colorTheme="gradient-modern-ui">
            <div class="no-mobile no-tablet" [lgColumns]="3"></div>

            <ui-card *ngFor="let r of roles" [smColumns]="4" [mdColumns]="4" [lgColumns]="2"
                (click)="navigateToJoin(r.role)">
                <div card-main>
                    <b>{{ r.label }}</b>
                </div>
                <div card-icon>
                    <app-icon [name]="r.icon" size="xxl"></app-icon>
                </div>
            </ui-card>

            <div class="no-mobile no-tablet" [lgColumns]="3"></div>
        </ui-form-layout>

        <!-- SOCIETIES SECTION -->
        <ui-form-layout [title]="'Societies'" [showAsSection]="true" colorTheme="gradient-light-airy"
            *ngIf="societies.length > 0">
            <ng-container *ngFor="let s of societies">
                <ui-circular-display [label]="s.societyName" [smColumns]="6" [mdColumns]="3" [lgColumns]="2"
                    (onClicked)="handleSocietyClick(s)">
                </ui-circular-display>
            </ng-container>
        </ui-form-layout>

        <ui-form-layout [title]="'Societies'" [showAsSection]="true" colorTheme="gradient-light-airy"
            *ngIf="societies.length === 0">
            <div class="empty-societies-placeholder" *ngIf="!isSocitiesLoading" [smColumns]="12" [mdColumns]="12"
                [lgColumns]="12">
                <div class="placeholder-content">
                    <div class="placeholder-icon">
                        <app-icon name="building" size="xl"></app-icon>
                    </div>
                    <h3 class="placeholder-title">No Societies Yet</h3>
                    <p class="placeholder-description">Get started by registering your society</p>
                    <ui-button label="New Registration" type="primary" (clicked)="navigateToAddSociety()">
                    </ui-button>
                </div>
            </div>

            <ui-loading *ngIf="isSocitiesLoading" message="Loading Societies" [smColumns]="12" [mdColumns]="12"
                [lgColumns]="12">
            </ui-loading>
        </ui-form-layout>
    </div>
</app-layout>
