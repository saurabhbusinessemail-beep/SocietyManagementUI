<app-layout [pageTitle]="'Manage Documents'" [subTitle]="subtitle" [showBackButton]="true">
    <div class="manager-container">
        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-card" (click)="fileInput.click()">
                <div class="upload-icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </div>
                <h3>Click to Upload Documents</h3>
                <p>PNG, JPG or PDF (Max 5MB)</p>
                <input type="file" #fileInput (change)="onFileSelected($event)" multiple hidden accept="image/*,application/pdf">
            </div>
            <div class="upload-progress" *ngIf="uploading">
                <ui-loading message="Uploading..."></ui-loading>
            </div>
        </div>

        <!-- Document List -->
        <div class="documents-section" *ngIf="!loading; else loadingState">
            <h2 class="section-title">Your Uploaded Documents</h2>
            
            <div class="document-grid" *ngIf="documents.length > 0; else emptyState">
                <div class="document-item" *ngFor="let doc of documents">
                    <div class="doc-preview" (click)="viewDocument(doc)">
                        <img [src]="doc.documentUrl" *ngIf="doc.documentType && doc.documentType.startsWith('image')" />
                        <div class="pdf-icon" *ngIf="doc.documentType === 'pdf' || (doc.documentType && !doc.documentType.startsWith('image'))">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M9 15h3a2 2 0 0 1 0 4h-3V15z"></path></svg>
                        </div>
                        <div class="status-badge" [ngClass]="doc.status">
                            {{ doc.status }}
                        </div>
                    </div>
                    <div class="doc-info">
                        <span class="doc-name text-ellipsis">{{ doc.documentName }}</span>
                        <div class="doc-actions">
                            <button class="action-btn" (click)="downloadDocument(doc); $event.stopPropagation()" title="Download">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            </button>
                            <button class="action-btn delete" (click)="deleteDocument(doc); $event.stopPropagation()" *ngIf="doc.status === 'pending' || doc.status === 'rejected'" title="Delete">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </div>
                    <div class="rejection-reason" *ngIf="doc.status === 'rejected' && doc.rejectionReason">
                        <strong>Reason:</strong> {{ doc.rejectionReason }}
                    </div>
                </div>
            </div>

            <ng-template #emptyState>
                <div class="empty-docs">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #94a3b8; margin-bottom: 16px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    <p>No documents uploaded yet. Start by clicking the upload area above.</p>
                </div>
            </ng-template>
        </div>

        <ng-template #loadingState>
            <div class="loading-container">
                <ui-loading message="Loading your documents..."></ui-loading>
            </div>
        </ng-template>
    </div>
</app-layout>
