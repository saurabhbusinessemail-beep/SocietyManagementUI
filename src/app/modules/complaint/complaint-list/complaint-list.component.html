<app-layout [hideMoreActions]="!isFlatMember" pageTitle="Complaints"
    [subTitle]="societyService.selectedSocietyFilterValue?.label">

    <ng-container moreActions>
        <!-- <ui-button label="New Complaint" type="primary" (clicked)="openAddComplaint()" [smColumns]="1" [mdColumns]="1"
            [lgColumns]="1">
        </ui-button> -->

        <ul class="page-menu-list" *ngIf="isFlatMember">
            <li class="page-menu" (click)="openAddComplaint()">New Complaint</li>
        </ul>
    </ng-container>


    <div class="flex-col full-h">
        <app-filter [dropDownControlConfigs]="[complaintTypeConfig]" [loadFirstFlat]="true" [loadFirstSociety]="true"
            [selectedFlatId]="routeFlatId" (isFlatMemberChanged)="isFlatMember=$event" [smColumns]="12" [mdColumns]="12"
            [lgColumns]="12" (filterChanged)="loadComplaints($event)">

            <ui-select2 [formControl]="complaintTypeControl" [config]="complaintTypeConfig"
                [options]="complaintTypeConfig.dropDownOptions ?? []" [smColumns]="12" [mdColumns]="4" [lgColumns]="4">
            </ui-select2>
        </app-filter>

        <ui-form-layout class="flex-auto">

            <ng-container *ngIf="!loadingComplaints">
                <ng-container *ngFor=" let complaint of complaints">

                    <ui-complaint-card [complaint]="complaint" [smColumns]="12" [mdColumns]="6" [lgColumns]="6"
                        [canApprove]="isStatusTransitionAllowed(complaint, 'approved') && amIManagerOfSociety(complaint)"
                        [canReject]="isStatusTransitionAllowed(complaint, 'rejected') && amIManagerOfSociety(complaint)"
                        [canMoveToProgress]="isStatusTransitionAllowed(complaint, 'in_progress') && amIManagerOfSociety(complaint)"
                        [canMarkResolved]="isStatusTransitionAllowed(complaint, 'resolved') && amIManagerOfSociety(complaint)"
                        [showDelete]="isMyComplaint(complaint)" [actionInProgress]="loadingComplaintActions[complaint._id]"
                        [canClose]="isStatusTransitionAllowed(complaint, 'closed') && isMyComplaint(complaint)"
                        (delete)="deleteComplaint(complaint)" (statusChange)="changeStatus(complaint, $event)">
                    </ui-complaint-card>

                </ng-container>

                <ng-container *ngIf="complaints.length === 0">
                    <app-empty-records singular="complaint" plural="complaints" [hideAddButton]="!isFlatMember"
                        (addClicked)="openAddComplaint()" [smColumns]="12" [mdColumns]="12" [lgColumns]="12">
                        <app-icon icon name="complaint" size="xxl"></app-icon>
                    </app-empty-records>
                </ng-container>

            </ng-container>


            <ui-loading *ngIf="loadingComplaints" message="Loading complaints" [smColumns]="12" [mdColumns]="12"
                [lgColumns]="12">
            </ui-loading>

        </ui-form-layout>
    </div>

</app-layout>
